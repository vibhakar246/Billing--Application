<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibhakar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .tagline {
            font-size: 12px;
            opacity: 0.9;
            margin-left: 10px;
        }

        .datetime {
            text-align: right;
            font-size: 14px;
        }

        #currentDate, #currentTime {
            margin: 5px 0;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 20px;
        }

        .menu-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #333;
        }

        .section-title i {
            font-size: 24px;
            color: #667eea;
        }

        .section-title h2 {
            font-size: 20px;
        }

        .order-count {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-left: 10px;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            border: none;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .category-btn:hover, .category-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .menu-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .menu-item h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .menu-item .price {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .menu-item .category {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .cart-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .customer-details {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .customer-details input, .customer-details select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-cart i {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-size: 12px;
            color: #999;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 15px;
        }

        .cart-item-quantity button {
            width: 25px;
            height: 25px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-item-total {
            font-weight: bold;
            min-width: 70px;
            text-align: right;
            color: #667eea;
        }

        .remove-item {
            color: #ff4757;
            cursor: pointer;
            margin-left: 10px;
        }

        .cart-summary {
            border-top: 2px solid #eee;
            padding-top: 15px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            border-top: 2px solid #eee;
            padding-top: 10px;
            margin-top: 10px;
        }

        .cart-actions {
            display: flex;
            gap: 10px;
        }

        .btn-clear, .btn-generate {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-clear {
            background: #ff4757;
            color: white;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-clear:hover, .btn-generate:hover {
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            border-radius: 15px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .close {
            font-size: 28px;
            cursor: pointer;
        }

        .bill {
            font-family: monospace;
        }

        .bill table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .bill th, .bill td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-print, .btn-close {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-print {
            background: #28a745;
            color: white;
        }

        .btn-close {
            background: #6c757d;
            color: white;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .cart-section {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h1>RestroBilling</h1>
                <span class="tagline">Smart Restaurant Billing System</span>
            </div>
            <div class="datetime">
                <div id="currentDate"></div>
                <div id="currentTime"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="menu-section">
                <div class="section-title">
                    <i class="fas fa-hamburger"></i>
                    <h2>Our Menu</h2>
                </div>
                <div class="category-tabs" id="categoryTabs"></div>
                <div class="menu-grid" id="menuGrid"></div>
            </div>

            <div class="cart-section">
                <div class="section-title">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Current Order</h2>
                    <span class="order-count" id="orderCount">0</span>
                </div>
                
                <div class="customer-details">
                    <input type="text" id="customerName" placeholder="Customer Name (Optional)">
                    <select id="paymentMethod">
                        <option value="Cash">Cash 💵</option>
                        <option value="Card">Card 💳</option>
                        <option value="UPI">UPI 📱</option>
                    </select>
                </div>

                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">
                        <i class="fas fa-shopping-basket"></i>
                        <p>No items added yet</p>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>GST (5%):</span>
                        <span id="gst">₹0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0.00</span>
                    </div>
                </div>

                <div class="cart-actions">
                    <button class="btn-clear" onclick="clearCart()">
                        <i class="fas fa-trash-alt"></i> Clear Cart
                    </button>
                    <button class="btn-generate" onclick="generateBill()">
                        <i class="fas fa-receipt"></i> Generate Bill
                    </button>
                </div>
            </div>
        </div>

        <div id="billModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-receipt"></i> RestroBilling Invoice</h2>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div id="billContent"></div>
                <div class="modal-footer">
                    <button onclick="printBill()" class="btn-print">
                        <i class="fas fa-print"></i> Print Bill
                    </button>
                    <button onclick="closeModal()" class="btn-close">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let menuItems = [
            { id: 1, name: "Plain Dal", price: 120, category_id: 1, category_name: "North Indian" },
            { id: 2, name: "Dal Makhani", price: 180, category_id: 1, category_name: "North Indian" },
            { id: 3, name: "Jeera Rice", price: 140, category_id: 1, category_name: "North Indian" },
            { id: 4, name: "Butter Rice", price: 160, category_id: 1, category_name: "North Indian" },
            { id: 5, name: "Tawa Roti", price: 15, category_id: 6, category_name: "Breads" },
            { id: 6, name: "Butter Roti", price: 20, category_id: 6, category_name: "Breads" },
            { id: 7, name: "Naan", price: 30, category_id: 6, category_name: "Breads" },
            { id: 8, name: "Veg Fried Rice", price: 150, category_id: 3, category_name: "Chinese" },
            { id: 9, name: "Chilli Paneer", price: 220, category_id: 3, category_name: "Chinese" },
            { id: 10, name: "Veg Burger", price: 80, category_id: 4, category_name: "Fast Food" },
            { id: 11, name: "French Fries", price: 90, category_id: 4, category_name: "Fast Food" },
            { id: 12, name: "Water Bottle", price: 20, category_id: 5, category_name: "Beverages" },
            { id: 13, name: "Soft Drink", price: 40, category_id: 5, category_name: "Beverages" },
            { id: 14, name: "Masala Dosa", price: 80, category_id: 2, category_name: "South Indian" },
            { id: 15, name: "Idli Sambhar", price: 70, category_id: 2, category_name: "South Indian" }
        ];

        function loadCategories() {
            const categories = [...new Map(menuItems.map(item => [item.category_id, { id: item.category_id, name: item.category_name }])).values()];
            const categoryTabs = document.getElementById('categoryTabs');
            categoryTabs.innerHTML = `<button class="category-btn active" data-category="all">All Items 🍽️</button>` +
                categories.map(cat => `<button class="category-btn" data-category="${cat.id}">${cat.name}</button>`).join('');
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    displayMenuItems(this.getAttribute('data-category'));
                });
            });
        }

        function displayMenuItems(category) {
            const menuGrid = document.getElementById('menuGrid');
            let filtered = category === 'all' ? menuItems : menuItems.filter(item => item.category_id == category);
            menuGrid.innerHTML = filtered.map(item => `
                <div class="menu-item" onclick="addToCart(${item.id})">
                    <h3>${item.name}</h3>
                    <div class="price">₹${item.price}</div>
                    <div class="category">${item.category_name}</div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            const existing = cart.find(i => i.id === id);
            if (existing) {
                existing.quantity++;
                existing.subtotal = existing.quantity * existing.price;
            } else {
                cart.push({ ...item, quantity: 1, subtotal: item.price });
            }
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartDiv = document.getElementById('cartItems');
            document.getElementById('orderCount').textContent = cart.reduce((s, i) => s + i.quantity, 0);
            
            if (cart.length === 0) {
                cartDiv.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-basket"></i><p>No items added yet</p></div>';
            } else {
                cartDiv.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">₹${item.price} each</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">₹${item.subtotal}</div>
                        <div class="remove-item" onclick="removeItem(${item.id})"><i class="fas fa-trash-alt"></i></div>
                    </div>
                `).join('');
            }
            updateTotals();
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                } else {
                    item.subtotal = item.quantity * item.price;
                }
                updateCartDisplay();
            }
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartDisplay();
        }

        function updateTotals() {
            const subtotal = cart.reduce((s, i) => s + i.subtotal, 0);
            const gst = subtotal * 0.05;
            const total = subtotal + gst;
            document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
            document.getElementById('gst').textContent = `₹${gst.toFixed(2)}`;
            document.getElementById('total').textContent = `₹${total.toFixed(2)}`;
        }

        function clearCart() {
            if (confirm('Clear cart?')) {
                cart = [];
                updateCartDisplay();
            }
        }

        function generateBill() {
            if (cart.length === 0) {
                alert('Add items first!');
                return;
            }
            const customer = document.getElementById('customerName').value || 'Guest';
            const payment = document.getElementById('paymentMethod').value;
            const subtotal = cart.reduce((s, i) => s + i.subtotal, 0);
            const gst = subtotal * 0.05;
            const total = subtotal + gst;
            const orderNo = 'RESTRO-' + Date.now().toString().slice(-8);
            
            document.getElementById('billContent').innerHTML = `
                <div class="bill">
                    <div style="text-align:center"><h2>RestroBilling</h2>
                    <p>123 Restaurant Street</p>
                    <p>Order: ${orderNo}</p>
                    <p>Customer: ${customer}</p>
                    <p>Payment: ${payment}</p>
                    <hr></div>
                    <table><thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
                    <tbody>${cart.map(i => `<tr><td>${i.name}</td><td>${i.quantity}</td><td>₹${i.price}</td><td>₹${i.subtotal}</td></tr>`).join('')}</tbody>
                    <tfoot><tr><td colspan="3">Subtotal:</td><td>₹${subtotal.toFixed(2)}</td></tr>
                    <tr><td colspan="3">GST 5%:</td><td>₹${gst.toFixed(2)}</td></tr>
                    <tr><td colspan="3"><strong>Total:</strong></td><td><strong>₹${total.toFixed(2)}</strong></td></tr></tfoot></table>
                    <div style="text-align:center; margin-top:20px;"><p>Thank you! Visit again 🙏</p></div>
                </div>
            `;
            document.getElementById('billModal').style.display = 'block';
            cart = [];
            updateCartDisplay();
        }

        function printBill() {
            const content = document.getElementById('billContent').innerHTML;
            const w = window.open('', '_blank');
            w.document.write(`<html><head><title>Bill</title><style>body{font-family:monospace;padding:20px}</style></head><body>${content}<script>window.onload=function(){window.print();setTimeout(function(){window.close()},500)}<\/script></body></html>`);
            w.document.close();
        }

        function closeModal() {
            document.getElementById('billModal').style.display = 'none';
        }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').innerHTML = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('currentTime').innerHTML = now.toLocaleTimeString();
        }

        loadCategories();
        displayMenuItems('all');
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
